<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Eusta Admin</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="assets/css/eusta-admin.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-body); padding:20px; }
    .fp-card { background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:44px 48px; max-width:440px; width:100%; box-shadow:var(--shadow-md); text-align:center; }
    .fp-icon { width:64px; height:64px; background:var(--gold-light); border:1px solid var(--gold-border); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    .fp-icon .material-symbols-outlined { font-size:32px; color:var(--gold); }
  </style>
</head>
<body>
  <div class="fp-card">
    <img src="assets/img/logo.png" alt="Eusta" style="height:34px; margin-bottom:28px;">
    <div class="fp-icon"><span class="material-symbols-outlined">lock_reset</span></div>
    <h2 style="font-size:22px; font-weight:800; margin-bottom:8px;">Forgot Password?</h2>
    <p class="text-muted" style="font-size:14px; line-height:1.7; margin-bottom:28px;">No worries! Enter the email address associated with your admin account and we'll send you a reset link.</p>
    <form id="fpForm">
      <div class="ea-form-group" style="text-align:left;">
        <label class="ea-label">Email Address</label>
        <div class="ea-input-icon">
          <span class="material-symbols-outlined">mail</span>
          <input type="email" class="ea-input" placeholder="admin@eusta.com" required>
        </div>
      </div>
      <button type="submit" class="ea-btn ea-btn-primary ea-btn-lg" style="width:100%; justify-content:center; margin-top:4px;">Send Reset Link</button>
    </form>
    <div style="margin-top:24px;">
      <a href="signin.html" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--text-muted); transition:color 0.2s;">
        <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
        Back to Sign In
      </a>
    </div>
  </div>
  <script>
    document.getElementById('fpForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = '✓ Reset Link Sent!';
      btn.style.background = '#059669';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'signin.html'; }, 2000);
    });
  </script>
</body>
</html>
