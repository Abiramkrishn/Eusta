<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — Eusta Admin</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="assets/css/eusta-admin.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-body); padding:20px; }
    .v-card { background:var(--bg-white); border:1px solid var(--border); border-radius:var(--radius-lg); padding:44px 48px; max-width:460px; width:100%; box-shadow:var(--shadow-md); text-align:center; }
    .v-icon { width:72px; height:72px; background:var(--gold-light); border:1px solid var(--gold-border); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
    .v-icon .material-symbols-outlined { font-size:36px; color:var(--gold); }
    .otp-row { display:flex; gap:10px; justify-content:center; margin:24px 0; }
    .otp-input { width:50px; height:56px; text-align:center; font-size:22px; font-weight:700; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text-head); transition:var(--transition); outline:none; }
    .otp-input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(177,139,94,0.12); }
  </style>
</head>
<body>
  <div class="v-card">
    <img src="assets/img/logo.png" alt="Eusta" style="height:34px; margin-bottom:28px;">
    <div class="v-icon"><span class="material-symbols-outlined">mark_email_read</span></div>
    <h2 style="font-size:22px; font-weight:800; margin-bottom:8px;">Verify Your Email</h2>
    <p class="text-muted" style="font-size:14px; line-height:1.7;">We've sent a 6-digit verification code to <strong style="color:var(--text-head);">admin@eusta.com</strong>. Enter the code below to continue.</p>

    <div class="otp-row">
      <input type="text" class="otp-input" maxlength="1" id="o1" oninput="otpNext(this,'o2')">
      <input type="text" class="otp-input" maxlength="1" id="o2" oninput="otpNext(this,'o3')">
      <input type="text" class="otp-input" maxlength="1" id="o3" oninput="otpNext(this,'o4')">
      <input type="text" class="otp-input" maxlength="1" id="o4" oninput="otpNext(this,'o5')">
      <input type="text" class="otp-input" maxlength="1" id="o5" oninput="otpNext(this,'o6')">
      <input type="text" class="otp-input" maxlength="1" id="o6" oninput="otpDone()">
    </div>

    <button class="ea-btn ea-btn-primary ea-btn-lg" style="width:100%; justify-content:center;" id="verifyBtn" onclick="verify()">Verify Code</button>

    <div style="margin-top:20px; font-size:13px; color:var(--text-muted);">
      Didn't receive the code?
      <button onclick="resend()" style="background:none; border:none; color:var(--gold); font-weight:600; cursor:pointer; font-size:13px; font-family:'Plus Jakarta Sans',sans-serif;">Resend</button>
    </div>
    <div style="margin-top:16px;"><a href="signin.html" style="display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--text-muted);"><span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>Back to Sign In</a></div>
  </div>

  <script>
    function otpNext(el, nextId) {
      if (el.value.length === 1 && nextId) document.getElementById(nextId).focus();
    }
    function otpDone() {}
    function verify() {
      const code = ['o1','o2','o3','o4','o5','o6'].map(id => document.getElementById(id).value).join('');
      if (code.length === 6) {
        const btn = document.getElementById('verifyBtn');
        btn.textContent = '✓ Verified! Redirecting…';
        btn.style.background = '#059669';
        btn.disabled = true;
        setTimeout(() => window.location.href = 'index.html', 1500);
      }
    }
    function resend() {
      const dots = ['o1','o2','o3','o4','o5','o6'];
      dots.forEach(id => document.getElementById(id).value = '');
      document.getElementById('o1').focus();
      alert('A new code has been sent to your email.');
    }
    // Auto-fill digit navigation with backspace support
    document.querySelectorAll('.otp-input').forEach((inp, idx, arr) => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !inp.value && idx > 0) arr[idx-1].focus();
      });
    });
  </script>
</body>
</html>
